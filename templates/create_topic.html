<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng bài viết mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="/">💻 Về Trang Chủ</a></div>
    </nav>
    <div class="container">
        <div class="card shadow-sm mx-auto" style="max-width: 800px;">
            <div class="card-body">
                <h3 class="card-title text-success mb-4">📝 Đăng bài viết mới</h3>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tiêu đề bài viết:</label>
                        <input type="text" name="title" class="form-control" required placeholder="Nhập tiêu đề...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Chuyên mục:</label>
                        <select name="category_id" class="form-select" required>
                            <option value="" disabled selected>-- Chọn chuyên mục --</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nội dung:</label>
                        <textarea name="content" class="form-control" rows="8" required placeholder="Nhập nội dung bài viết của bạn..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-success px-4">Đăng Bài</button>
                    <a href="/" class="btn btn-secondary px-4">Hủy</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
