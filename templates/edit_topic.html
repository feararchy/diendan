<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa bài viết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.ck-editor__editable_inline { min-height: 250px; }</style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="/">💻 Về Trang Chủ</a></div>
    </nav>
    <div class="container mb-5">
        <div class="card shadow-sm mx-auto" style="max-width: 800px;">
            <div class="card-body">
                <h3 class="card-title text-primary mb-4">✏️ Chỉnh sửa bài viết</h3>
                
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tiêu đề bài viết:</label>
                        <input type="text" name="title" class="form-control" value="{{ topic.title }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Chuyên mục:</label>
                        <select name="category_id" class="form-select" required>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if cat.id == topic.category.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Ảnh đính kèm (Thay ảnh mới nếu muốn):</label>
                        {% if topic.image %}
                            <div class="mb-2"><small class="text-muted">Ảnh hiện tại: <a href="{{ topic.image.url }}" target="_blank">Xem ảnh</a></small></div>
                        {% endif %}
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nội dung:</label>
                        <textarea name="content" class="form-control">{{ topic.content }}</textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary px-4 fw-bold">Lưu Thay Đổi</button>
                    <a href="{% url 'topic_detail' topic.id %}" class="btn btn-secondary px-4">Hủy</a>
                </form>
            </div>
        </div>
    </div>

    <!-- CKEditor -->
    <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
    <script>
        ClassicEditor
            .create(document.querySelector('textarea[name="content"]'))
            .catch(error => { console.error(error); });
    </script>
</body>
</html>
