<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 400px;">
        <h3 class="text-center text-success mb-4">Tạo Tài Khoản</h3>
        {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Chọn Tên tài khoản</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tạo Mật khẩu</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Đăng Ký</button>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'login' %}">Đã có tài khoản? Đăng nhập</a> | <a href="/">Về Trang Chủ</a>
        </div>
    </div>
</body>
</html>
